<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#CE4A1E"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bg)"/>

  <!-- Crab body (simplified, stylized) -->
  <ellipse cx="256" cy="280" rx="120" ry="85" fill="url(#rust)" opacity="0.95"/>

  <!-- Crab claws - left -->
  <path d="M136 240 Q100 200 80 220 Q60 240 90 260 Q105 270 136 260 Z" fill="url(#rust)" opacity="0.9"/>
  <path d="M80 220 Q65 200 50 215 Q45 230 60 240" fill="none" stroke="#CE4A1E" stroke-width="8" stroke-linecap="round"/>

  <!-- Crab claws - right -->
  <path d="M376 240 Q412 200 432 220 Q452 240 422 260 Q407 270 376 260 Z" fill="url(#rust)" opacity="0.9"/>
  <path d="M432 220 Q447 200 462 215 Q467 230 452 240" fill="none" stroke="#CE4A1E" stroke-width="8" stroke-linecap="round"/>

  <!-- Crab legs - left side -->
  <line x1="160" y1="310" x2="100" y2="360" stroke="#CE4A1E" stroke-width="7" stroke-linecap="round"/>
  <line x1="150" y1="330" x2="85" y2="370" stroke="#CE4A1E" stroke-width="7" stroke-linecap="round"/>
  <line x1="145" y1="350" x2="80" y2="380" stroke="#CE4A1E" stroke-width="7" stroke-linecap="round"/>

  <!-- Crab legs - right side -->
  <line x1="352" y1="310" x2="412" y2="360" stroke="#CE4A1E" stroke-width="7" stroke-linecap="round"/>
  <line x1="362" y1="330" x2="427" y2="370" stroke="#CE4A1E" stroke-width="7" stroke-linecap="round"/>
  <line x1="367" y1="350" x2="432" y2="380" stroke="#CE4A1E" stroke-width="7" stroke-linecap="round"/>

  <!-- Crab eyes -->
  <circle cx="220" cy="240" r="16" fill="#1a1a1a"/>
  <circle cx="292" cy="240" r="16" fill="#1a1a1a"/>
  <circle cx="224" cy="236" r="6" fill="#ffffff" opacity="0.8"/>
  <circle cx="296" cy="236" r="6" fill="#ffffff" opacity="0.8"/>

  <!-- Markdown "M" on the crab body -->
  <path d="M210 290 L210 320 L232 305 L256 320 L256 290" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M268 320 L268 290 L292 290" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="268" y1="305" x2="286" y2="305" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>

  <!-- Down arrow (markdown icon element) -->
  <path d="M300 310 L310 325 L320 310" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gear teeth around body (Rust cog motif) -->
  <g fill="none" stroke="#FF6B35" stroke-width="3" opacity="0.4">
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(0,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(30,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(60,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(90,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(120,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(150,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(180,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(210,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(240,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(270,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(300,256,280)"/>
    <rect x="246" y="185" width="20" height="12" rx="2" transform="rotate(330,256,280)"/>
  </g>
</svg>
